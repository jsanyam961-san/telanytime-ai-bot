<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelAnytime AI Assistant - Prototype</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0052cc; /* TelAnytime Brand Blue */
            --bg-light: #f4f7f9;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #e5e5e5;
            margin: 0;
            padding: 0;
        }

        /* Floating Button */
        #chat-launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        #chat-launcher:hover { transform: scale(1.1); }

        /* Chat Widget Container */
        #chat-widget {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 380px;
            height: 550px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none; /* Hidden by default */
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            border: 1px solid #ddd;
        }

        /* Header */
        #chat-header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-info h4 { margin: 0; font-size: 16px; }
        .header-info p { margin: 0; font-size: 12px; opacity: 0.8; }

        /* Chat Body */
        #chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--bg-light);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .bot-msg {
            background: white;
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .user-msg {
            background: var(--primary-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        /* Suggestion Chips */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .chip {
            background: #fff;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .chip:hover {
            background: var(--primary-color);
            color: white;
        }

        /* Footer Input */
        #chat-footer {
            padding: 15px;
            background: white;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        #chat-footer input {
            flex: 1;
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 25px;
            outline: none;
        }

        #chat-footer button {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="chat-launcher" onclick="toggleChat()">
    <i class="fas fa-comment-dots"></i>
</div>

<div id="chat-widget">
    <div id="chat-header">
        <i class="fas fa-robot fa-2x"></i>
        <div class="header-info">
            <h4>TelAnytime AI Assistant</h4>
            <p><i class="fas fa-circle" style="color: #2ecc71; font-size: 8px;"></i> Online | Always Anytime</p>
        </div>
        <i class="fas fa-times" onclick="toggleChat()" style="margin-left: auto; cursor: pointer;"></i>
    </div>

    <div id="chat-body">
        <div class="message bot-msg">
            Hello! Main TelAnytime AI Assistant hoon. Dashboard manage karne ya connectivity issues solve karne mein main aapki kya madad kar sakta hoon?
        </div>
        <div class="suggestions">
            <div class="chip" onclick="autoReply('Check Account Balance')">Check Balance</div>
            <div class="chip" onclick="autoReply('Call Connectivity Help')">Network Issue</div>
            <div class="chip" onclick="autoReply('Latest Calling Plans')">View Plans</div>
        </div>
    </div>

    <div id="chat-footer">
        <input type="text" id="userInput" placeholder="Yahan apna sawal likhein...">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    function toggleChat() {
        const chat = document.getElementById('chat-widget');
        chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (text !== "") {
            addMessage(text, 'user-msg');
            input.value = '';
            processAI(text);
        }
    }

    function autoReply(text) {
        addMessage(text, 'user-msg');
        processAI(text);
    }

    function addMessage(text, type) {
        const chatBody = document.getElementById('chat-body');
        const div = document.createElement('div');
        div.className = 'message ' + type;
        div.innerText = text;
        chatBody.appendChild(div);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function processAI(text) {
        setTimeout(() => {
            let response = "Main aapki query check kar raha hoon. Kya aap mujhe apni User ID bata sakte hain?";
            
            if(text.toLowerCase().includes('balance')) {
                response = "Aapka current account balance **$24.50** hai. Kya aap isse top-up karna chahte hain?";
            } else if(text.toLowerCase().includes('network') || text.toLowerCase().includes('issue')) {
                response = "Humare system ne aapke area mein minor maintenance detect kiya hai. Main aapke liye support ticket raise kar deta hoon.";
            } else if(text.toLowerCase().includes('plan')) {
                response = "TelAnytime 'Global Pro' plan aapke liye best hai. Isme unlimited international calls milte hain. Details bhejoon?";
            }

            addMessage(response, 'bot-msg');
        }, 800);
    }
</script>

</body>
</html>
